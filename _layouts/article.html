---
layout: default
---
<header class="hero article-hero">
  <div class="container article-hero-inner">
    <p class="breadcrumb">
      <a href="{{ "/" | relative_url }}">首页</a>
      <span>/</span>
      <a href="{{ page.section_url | relative_url }}">{{ page.section_label }}</a>
    </p>
    <h1>{{ page.article_title | default: page.title }}</h1>
    <p class="subtitle">{{ page.article_subtitle }}</p>
    <p class="article-meta">
      <span>{{ page.article_type }}</span>
      <span>{{ page.article_topic }}</span>
    </p>
  </div>
</header>

<main class="container">
  <section class="card article-card">
    <article class="markdown-body">
      {{ content }}
    </article>
  </section>

  <nav class="article-nav">
    <a href="{{ page.section_url | relative_url }}">返回{{ page.section_label }}</a>
  </nav>
</main>
