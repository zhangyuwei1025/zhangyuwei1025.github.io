<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 GitHub 页面</title>
  <meta name="description" content="这是一个部署在 GitHub Pages 的个人主页示例。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <h1>你好，我是 your-username</h1>
    <p class="subtitle">欢迎来到我的 GitHub Pages 主页。</p>
    <a class="btn" href="https://github.com/your-username" target="_blank" rel="noreferrer">访问我的 GitHub</a>
  </header>

  <main class="container">
    <section class="card">
      <h2>关于我</h2>
      <p>
        这里可以写你的简介，例如：你正在学习什么、正在做什么项目、擅长哪些技术。
      </p>
    </section>

    <section class="card">
      <h2>项目</h2>
      <ul>
        <li><a href="#">项目 A</a> - 用一句话介绍项目。</li>
        <li><a href="#">项目 B</a> - 用一句话介绍项目。</li>
        <li><a href="#">项目 C</a> - 用一句话介绍项目。</li>
      </ul>
    </section>

    <section class="card">
      <h2>联系方式</h2>
      <ul class="links">
        <li><a href="mailto:you@example.com">邮箱</a></li>
        <li><a href="https://github.com/your-username" target="_blank" rel="noreferrer">GitHub</a></li>
      </ul>
    </section>
  </main>

  <footer>
    <p>© <span id="year"></span> your-username. Built with GitHub Pages.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
